name: CI/CD - Build, Push & Deploy

# Trigger on push to main branch
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Job 1: Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run tests with test profile
        run: mvn test
        env:
          SPRING_PROFILES_ACTIVE: test

  # Job 2: Build and push Docker image
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Docker Hub secrets
        id: check-secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets missing. Skipping build/push steps."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.check-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        if: steps.check-secrets.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: steps.check-secrets.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        if: steps.check-secrets.outputs.ready == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/kodera
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        if: steps.check-secrets.outputs.ready == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to server
  deploy:
    name: Deploy to CSC cPouta
    needs: build-and-push
    runs-on: ubuntu-latest
    # HUOM: Kommentoi seuraava rivi pois kun palvelin on valmis
    if: false  # Disable deployment until server is ready
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to production server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          # Copy production compose file to server
          scp -i ~/.ssh/deploy_key compose-prod.yml $SSH_USER@$SSH_HOST:~/kodera/
          
          # Deploy via SSH
          ssh -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << 'EOF'
          cd ~/kodera
          
          # Set environment variables
          export DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          export DB_USERNAME="${{ secrets.DB_USERNAME }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export DB_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}"
          
          # Login to Docker Hub
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKER_USERNAME" --password-stdin
          
          # Pull latest image and restart services
          docker compose -f compose-prod.yml pull
          docker compose -f compose-prod.yml up -d
          
          # Clean up old images
          docker image prune -f
          
          echo "Deployment completed successfully!"
          EOF
