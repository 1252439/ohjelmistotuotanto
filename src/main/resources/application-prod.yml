# Production profile - for CSC cPouta deployment

spring:
  datasource:
    url: jdbc:mariadb://mariadb:3306/kodera_prod
    username: ${DB_USERNAME:produser}
    password: ${DB_PASSWORD:prodpassword}
    driver-class-name: org.mariadb.jdbc.Driver
  
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

server:
  port: 8080

logging:
  level:
    fi.seamk: INFO
    org.springframework: WARN
