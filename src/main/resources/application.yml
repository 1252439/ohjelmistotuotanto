spring:
  application:
    name: kodera

  # Default profile is dev
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

gemini:
  api:
    model: ${GEMINI_MODEL:gemini-1.5-flash}
    key: ${GEMINI_API_KEY:}
